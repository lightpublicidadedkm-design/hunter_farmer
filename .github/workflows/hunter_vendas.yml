
name: 🚀 IA Sales Hunter - Sicredi

on:
  schedule:
    # Roda toda segunda-feira às 08:00 (Horário de Brasília)
    # Obs: O cron do GitHub usa horário UTC. 11:00 UTC = 08:00 BRT
    - cron: '0 11 * * 1'
  
  # Habilita um botão no GitHub para você rodar manualmente quando quiser testar
  workflow_dispatch: 

jobs:
  prospecao_automata:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Baixar o código do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Versão estável para as bibliotecas atuais

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv google-genai pandas openpyxl supabase

      - name: 🤖 Executar o Motor Hunter (Gemini + Trello + Supabase)
        env:
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_API_TOKEN: ${{ secrets.TRELLO_API_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # ATENÇÃO: Se o seu arquivo Python tiver outro nome, mude aqui embaixo.
          python hunter_vendas.py 

      - name: 📊 Salvar a Planilha de Leads Quentes (Se houver)
        uses: actions/upload-artifact@v4
        with:
          name: Leads_Quentes_Sicredi
          path: leads_quentes_sicredi.xlsx
          if-no-files-found: ignore # Se ninguém respondeu "Ok" na semana, ele não gera erro
          retention-days: 7
