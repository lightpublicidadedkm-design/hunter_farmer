name: 🚀 IA Sales Hunter - Sicredi

on:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch: 

jobs:
  prospecao_automata:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Baixar o código do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv google-genai pandas openpyxl supabase

      - name: 🤖 Executar o Motor Hunter
        env:
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_API_TOKEN: ${{ secrets.TRELLO_API_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python sales_hunter.py 

      - name: 📊 Salvar a Planilha de Leads Quentes
        uses: actions/upload-artifact@v4
        with:
          name: Leads_Quentes_Sicredi
          path: leads_quentes_sicredi.xlsx
          if-no-files-found: ignore
          retention-days: 7